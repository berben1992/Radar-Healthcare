    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cardone', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 300;
      background: #f4f6f9;
      color: #323338;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e6e9ef;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .site-header .logo-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }
    .site-header .adelie-logo {
      font-family: 'Cardone', sans-serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: #323338;
      white-space: nowrap;
    }
    .site-header img.client-logo {
      height: 36px;
      width: auto;
    }
    .site-header .divider {
      width: 1px;
      height: 32px;
      background: #e6e9ef;
    }
    .site-header .header-text h1 {
      font-size: 20px;
      font-weight: 300;
      color: #323338;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .site-header .header-text .subtitle {
      font-size: 13px;
      color: #9699a6;
      font-style: italic;
      margin-top: 2px;
    }
    .site-header .penguin-wrap {
      display: flex;
      align-items: flex-end;
      opacity: 0.55;
    }

    /* ── Overall progress ── */
    .overall-card {
      background: #fff;
      border: 1px solid #e6e9ef;
      border-radius: 12px;
      padding: 24px 28px;
      margin: 28px 40px 0;
    }
    .overall-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .overall-label span:first-child {
      font-size: 11px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9699a6;
    }
    .overall-label .pct {
      font-size: 22px;
      font-weight: 300;
      color: #00aba9;
    }
    .bar-track {
      background: #e6e9ef;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00aba9, #17d4d2);
      transition: width 0.6s ease;
    }
    .stats-row {
      display: flex;
      gap: 32px;
      margin-top: 16px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat .val {
      font-size: 18px;
      font-weight: 300;
      color: #323338;
    }
    .stat .lbl {
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #9699a6;
    }

    /* ── Main content ── */
    .content {
      padding: 24px 40px 48px;
    }

    /* ── Phase / Group cards ── */
    .group-card {
      background: #fff;
      border: 1px solid #e6e9ef;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid #e6e9ef;
      cursor: pointer;
      user-select: none;
    }
    .group-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .group-title {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.03em;
      flex: 1;
    }
    .group-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .group-progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group-bar {
      width: 80px;
      height: 5px;
      background: #e6e9ef;
      border-radius: 99px;
      overflow: hidden;
    }
    .group-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: #00aba9;
    }
    .group-pct {
      font-size: 12px;
      font-weight: 300;
      color: #9699a6;
      min-width: 30px;
      text-align: right;
    }
    .chevron {
      font-size: 11px;
      color: #9699a6;
      transition: transform 0.2s;
    }
    .group-card.collapsed .chevron { transform: rotate(-90deg); }
    .group-card.collapsed .group-body { display: none; }

    /* ── Items table ── */
    .group-body { padding: 0; }

    .col-headers {
      display: grid;
      grid-template-columns: 1fr 140px 130px 160px;
      padding: 8px 20px;
      background: #f9fafb;
      border-bottom: 1px solid #e6e9ef;
      font-size: 10px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9699a6;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 140px 130px 160px;
      padding: 12px 20px;
      border-bottom: 1px solid #f0f2f5;
      align-items: start;
      transition: background 0.15s;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #fafbfc; }

    .item-name-wrap {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      color: #9699a6;
      padding: 2px 4px;
      line-height: 1.6;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .expand-btn:hover { color: #323338; }
    .expand-btn.open { transform: rotate(90deg); }

    .item-name {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.5;
    }
    .no-subitems-spacer { width: 20px; flex-shrink: 0; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3px;
      color: #fff;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .due-date {
      font-size: 13px;
      color: #323338;
    }
    .due-date.overdue { color: #e44258; }
    .due-date.soon { color: #f65f7c; }
    .due-date.empty { color: #c5c7d0; }

    .assignee {
      font-size: 13px;
      color: #323338;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #00aba9;
      color: #fff;
      font-size: 10px;
      font-weight: 300;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Subitems ── */
    .subitems-container {
      display: none;
      background: #f9fafb;
      border-top: 1px solid #f0f2f5;
    }
    .subitems-container.open { display: block; }

    .subitem-row {
      display: grid;
      grid-template-columns: 1fr 140px 130px 160px;
      padding: 9px 20px 9px 52px;
      border-bottom: 1px solid #f0f2f5;
      align-items: center;
      font-size: 13px;
    }
    .subitem-row:last-child { border-bottom: none; }
    .subitem-name { color: #676879; font-weight: 300; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 20px 16px 28px;
      font-size: 12px;
      color: #c5c7d0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .footer a { color: #9699a6; text-decoration: none; }

    /* ── Loading / Error ── */
    .state-box {
      text-align: center;
      padding: 80px 40px;
      color: #9699a6;
    }
    .state-box .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #e6e9ef;
      border-top-color: #00aba9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #e44258; }

    /* ── Refresh strip ── */
    .refresh-strip {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 40px 10px;
      font-size: 11px;
      color: #c5c7d0;
      letter-spacing: 0.3px;
    }
    .refresh-btn {
      background: none;
      border: 1px solid #e6e9ef;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Cardone', sans-serif;
      font-weight: 300;
      cursor: pointer;
      color: #9699a6;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover { border-color: #00aba9; color: #00aba9; }

    @media (max-width: 680px) {
      .site-header, .overall-card, .content, .refresh-strip { padding-left: 16px; padding-right: 16px; }
      .overall-card { margin-left: 16px; margin-right: 16px; }
      .col-headers, .item-row, .subitem-row {
        grid-template-columns: 1fr 100px;
      }
      .col-headers > *:nth-child(3),
      .col-headers > *:nth-child(4),
      .item-row > *:nth-child(3),
      .item-row > *:nth-child(4),
      .subitem-row > *:nth-child(3),
      .subitem-row > *:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="state-box">
    <div class="spinner"></div>
    <p>Loading project data&hellip;</p>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const API_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY4MjQzNTYxMSwiYWFpIjoxMSwidWlkIjoxMDM3MTIzODgsImlhZCI6IjIwMjYtMDctMTRUMTM6MzA6MDQuMzM1WiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjM1MTQwMTY2LCJyZ24iOiJldWMxIn0.hSwzdh7yuvIHHdRNMofZGGNwf1UvdKEqaGP4G2JxyMY';
const BOARD_ID  = '5098190538';
const REFRESH_MS = 5 * 60 * 1000;
const DONE_LABELS = ['done', 'complete', 'completed', 'finished', 'closed', 'delivered'];

// ─────────────────────────────────────────────
//  PENGUIN SVG (adelie, sliding)
// ─────────────────────────────────────────────
// Penguin image will be embedded here once the file is attached
const PENGUIN_IMG = ''; // placeholder — set to base64 data URI when image is provided

// ─────────────────────────────────────────────
//  RADAR HEALTHCARE LOGO
// ─────────────────────────────────────────────
const RADAR_LOGO_URL = 'https://radarhealthcare.com/wp-content/themes/radar-healthcare/img/radar-logo-new-sm.svg';

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────
const GQL_QUERY = `
query GetBoard($ids: [ID!]!) {
  boards(ids: $ids) {
    name
    description
    columns { id title type settings_str }
    groups   { id title color }
    items_page(limit: 200) {
      items {
        id name
        group { id title }
        column_values {
          id text value
          column { id title type }
        }
        subitems {
          id name
          column_values {
            id text value
            column { id title type }
          }
        }
      }
    }
  }
}`;

async function fetchBoard() {
  const res = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': API_TOKEN,
      'API-Version': '2024-01'
    },
    body: JSON.stringify({ query: GQL_QUERY, variables: { ids: [BOARD_ID] } })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors.map(e => e.message).join(', '));
  return json.data.boards[0];
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function parseSettings(col) {
  try { return JSON.parse(col.settings_str); } catch { return {}; }
}

function buildStatusMeta(columns) {
  const map = {};
  columns.forEach(col => {
    if (col.type !== 'color') return;
    const s = parseSettings(col);
    map[col.id] = { labels: s.labels || {}, colors: s.labels_colors || {} };
  });
  return map;
}

function getStatusColor(statusMeta, colId, value) {
  try {
    const idx = JSON.parse(value).index;
    return statusMeta[colId]?.colors[idx]?.color || '#c5c7d0';
  } catch { return '#c5c7d0'; }
}

function isDone(text) {
  return DONE_LABELS.includes((text || '').toLowerCase().trim());
}

function formatDate(text) {
  if (!text) return null;
  const d = new Date(text);
  if (isNaN(d)) return text;
  const now = new Date();
  const diff = (d - now) / 86400000;
  return { str: d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }), diff };
}

function initials(name) {
  return (name || '?').split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
}

function hslFromStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h<<5)-h);
  return `hsl(${Math.abs(h)%360},45%,50%)`;
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render(board) {
  const statusMeta = buildStatusMeta(board.columns);
  const groupOrder = board.groups.map(g => g.id);
  const groupMap   = Object.fromEntries(board.groups.map(g => [g.id, g]));

  const byGroup = {};
  board.items_page.items.forEach(item => {
    const gid = item.group.id;
    if (!byGroup[gid]) byGroup[gid] = [];
    byGroup[gid].push(item);
  });

  let totalItems = 0, doneItems = 0;
  board.items_page.items.forEach(item => {
    totalItems++;
    const sv = item.column_values.find(cv => cv.column.type === 'color');
    if (sv && isDone(sv.text)) doneItems++;
  });
  const overallPct = totalItems ? Math.round((doneItems / totalItems) * 100) : 0;
  const now = new Date();

  let html = `
    <div class="site-header">
      <div class="logo-wrap">
        <span class="adelie-logo">adelie</span>
        <div class="divider"></div>
        <img class="client-logo" src="${RADAR_LOGO_URL}" alt="Radar Healthcare" onerror="this.style.display='none'"/>
        <div class="divider"></div>
        <div class="header-text">
          <h1>${esc(board.name)}</h1>
          ${board.description ? `<p class="subtitle">${esc(board.description)}</p>` : '<p class="subtitle">ISO14001 &amp; Carbon Reduction Plan (CRP)</p>'}
        </div>
      </div>
      <div class="penguin-wrap" title="adelie.eco">${PENGUIN_IMG ? `<img src="${PENGUIN_IMG}" alt="adelie" style="height:40px;width:auto;opacity:0.6">` : ''}</div>
    </div>

    <div class="overall-card">
      <div class="overall-label">
        <span>Overall Progress</span>
        <span class="pct">${overallPct}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${overallPct}%"></div>
      </div>
      <div class="stats-row">
        <div class="stat"><span class="val">${doneItems}</span><span class="lbl">Completed</span></div>
        <div class="stat"><span class="val">${totalItems - doneItems}</span><span class="lbl">Remaining</span></div>
        <div class="stat"><span class="val">${totalItems}</span><span class="lbl">Total tasks</span></div>
      </div>
    </div>

    <div class="refresh-strip">
      <span id="last-updated">Updated ${now.toLocaleTimeString()}</span>
      <button class="refresh-btn" onclick="loadAndRender()">↻ Refresh</button>
    </div>

    <div class="content">
  `;

  groupOrder.forEach(gid => {
    const group = groupMap[gid];
    const items = byGroup[gid] || [];
    if (!items.length) return;

    const color = group.color || '#c5c7d0';
    const gDone = items.filter(item => {
      const sv = item.column_values.find(cv => cv.column.type === 'color');
      return sv && isDone(sv.text);
    }).length;
    const gPct = Math.round((gDone / items.length) * 100);

    html += `
      <div class="group-card" id="group-${gid}">
        <div class="group-header" onclick="toggleGroup('${gid}')">
          <div class="group-dot" style="background:${color}"></div>
          <span class="group-title">${esc(group.title)}</span>
          <div class="group-meta">
            <div class="group-progress-wrap">
              <div class="group-bar">
                <div class="group-bar-fill" style="width:${gPct}%; background:${color}"></div>
              </div>
              <span class="group-pct">${gPct}%</span>
            </div>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="group-body">
          <div class="col-headers">
            <div>Task</div><div>Status</div><div>Due Date</div><div>Assignee</div>
          </div>`;

    items.forEach(item => {
      const statusCV = item.column_values.find(cv => cv.column.type === 'color');
      const dateCV   = item.column_values.find(cv => cv.column.type === 'date');
      const personCV = item.column_values.find(cv => cv.column.type === 'multiple-person' || cv.column.type === 'people' || cv.column.type === 'person');

      const statusText  = statusCV?.text || '';
      const statusColor = statusCV ? getStatusColor(statusMeta, statusCV.column.id, statusCV.value) : '#c5c7d0';

      const dateInfo = dateCV ? formatDate(dateCV.text) : null;
      let dateClass = 'empty', dateStr = '—';
      if (dateInfo) {
        dateStr = dateInfo.str;
        dateClass = dateInfo.diff < 0 ? 'overdue' : dateInfo.diff < 3 ? 'soon' : '';
      }

      let assigneeHtml = '<span style="color:#c5c7d0">—</span>';
      if (personCV?.text) {
        const names = personCV.text.split(',').map(n => n.trim()).filter(Boolean);
        if (names.length) {
          const avatars = names.slice(0,3).map(name =>
            `<span class="avatar" style="background:${hslFromStr(name)}" title="${esc(name)}">${initials(name)}</span>`
          ).join('');
          assigneeHtml = avatars + `<span style="font-size:13px;margin-left:5px">${esc(names.join(', '))}</span>`;
        }
      }

      const hasSubs = item.subitems?.length > 0;

      html += `
        <div class="item-row">
          <div class="item-name-wrap">
            ${hasSubs
              ? `<button class="expand-btn" id="btn-${item.id}" onclick="toggleSubs('${item.id}')">▶</button>`
              : `<span class="no-subitems-spacer"></span>`
            }
            <span class="item-name">${esc(item.name)}</span>
          </div>
          <div>
            ${statusText
              ? `<span class="status-badge" style="background:${statusColor}">${esc(statusText)}</span>`
              : '<span style="color:#c5c7d0">—</span>'
            }
          </div>
          <div class="due-date ${dateClass}">${dateStr}</div>
          <div class="assignee">${assigneeHtml}</div>
        </div>`;

      if (hasSubs) {
        html += `<div class="subitems-container" id="subs-${item.id}">`;
        item.subitems.forEach(sub => {
          const ssv = sub.column_values.find(cv => cv.column.type === 'color');
          const sdv = sub.column_values.find(cv => cv.column.type === 'date');
          const spv = sub.column_values.find(cv => cv.column.type === 'multiple-person' || cv.column.type === 'people' || cv.column.type === 'person');

          const sStatusText  = ssv?.text || '';
          const sStatusColor = ssv ? getStatusColor(statusMeta, ssv.column.id, ssv.value) : '#c5c7d0';

          const sdi = sdv ? formatDate(sdv.text) : null;
          let sDC = 'empty', sDS = '—';
          if (sdi) { sDS = sdi.str; sDC = sdi.diff < 0 ? 'overdue' : sdi.diff < 3 ? 'soon' : ''; }

          let sAH = '<span style="color:#c5c7d0">—</span>';
          if (spv?.text) {
            const snames = spv.text.split(',').map(n => n.trim()).filter(Boolean);
            if (snames.length) {
              sAH = snames.slice(0,3).map(name =>
                `<span class="avatar" style="background:${hslFromStr(name)}" title="${esc(name)}">${initials(name)}</span>`
              ).join('') + `<span style="font-size:13px;margin-left:5px">${esc(snames.join(', '))}</span>`;
            }
          }

          html += `
            <div class="subitem-row">
              <div class="subitem-name">↳ ${esc(sub.name)}</div>
              <div>${sStatusText ? `<span class="status-badge" style="background:${sStatusColor}">${esc(sStatusText)}</span>` : '<span style="color:#c5c7d0">—</span>'}</div>
              <div class="due-date ${sDC}">${sDS}</div>
              <div class="assignee">${sAH}</div>
            </div>`;
        });
        html += `</div>`;
      }
    });

    html += `</div></div>`;
  });

  html += `</div>
    <div class="footer">
      <span>Live data from monday.com · refreshes every 5 min</span>
    </div>`;

  document.getElementById('app').innerHTML = html;
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleGroup(gid) {
  document.getElementById('group-' + gid).classList.toggle('collapsed');
}

function toggleSubs(itemId) {
  const c = document.getElementById('subs-' + itemId);
  const b = document.getElementById('btn-' + itemId);
  if (!c) return;
  b.classList.toggle('open', c.classList.toggle('open'));
}

async function loadAndRender() {
  try {
    const board = await fetchBoard();
    render(board);
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="site-header">
        <div class="logo-wrap">
          <span class="adelie-logo">adelie</span>
          <div class="divider"></div>
          <img class="client-logo" src="${RADAR_LOGO_URL}" alt="Radar Healthcare" onerror="this.style.display='none'"/>
        </div>
        <div class="penguin-wrap">${PENGUIN_IMG ? `<img src="${PENGUIN_IMG}" alt="adelie" style="height:40px;width:auto;opacity:0.6">` : ''}</div>
      </div>
      <div class="state-box">
        <p class="error-msg">Could not load project data.</p>
        <p style="margin-top:8px;font-size:13px">${err.message}</p>
        <button class="refresh-btn" style="margin-top:16px" onclick="loadAndRender()">Try again</button>
      </div>`;
  }
}

loadAndRender();
setInterval(loadAndRender, REFRESH_MS);
</script>
</body>
</html>
